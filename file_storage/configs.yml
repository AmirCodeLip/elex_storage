service_name: file_storage
migrations_dir: migrations

loki:
  # Main endpoint for pushing logs
  api_address: http://localhost:3100/loki/api/v1/push

  # Optional: Alternative endpoint for queries
  query_address: http://localhost:3100/loki/api/v1/query

  # Authentication (if needed)
  auth:
    username: ${LOKI_USER:-} # Optional, env var with default empty
    password: ${LOKI_PASSWORD:-}
    tenant_id: ${LOKI_TENANT_ID:-file_storage}

server:
  http_listen_url: localhost:50053

# Database configuration
database:
  host: localhost
  port: 5432
  name: file_storage
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  schema: public

# RabbitMQ configuration
rabbitmq:
  host: localhost
  port: 5672
  user: ${RABBITMQ_USER}
  password: ${RABBITMQ_PASSWORD}

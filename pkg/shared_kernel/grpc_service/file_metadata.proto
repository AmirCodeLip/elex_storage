syntax = "proto3";

option go_package = "elex_storage/pkg/shared_kernel/grpc_service"; 
package file_metadata;

message CreateDirectoryRequest {
  string name = 1;
  string parentId = 2;
}

message GetDirectoriesRequest {
    string parrentId = 1;
}

message GetStorageItemsRequest{
    string parrentId = 1;
}

message DirectoryInfo {
  string id = 1;
  string name = 2;
  int32 size = 3;
  string parentId = 4;
}

message FileInfo {
  string id = 1;
  string name = 2;
  int32 size = 3;
  string directory_id = 4;
  string file_extension = 5;
  int64 created_at = 6;
  int64 update_at = 7;
}

message StorageItemsResponse {
  repeated DirectoryInfo directories = 1;
  repeated FileInfo files = 2;
}

service FileMetadataService {
  rpc GetDirectories(GetDirectoriesRequest) returns (StorageItemsResponse);
  rpc CreateDirectory (CreateDirectoryRequest) returns (DirectoryInfo);
  rpc GetStorageItems(GetStorageItemsRequest) returns (StorageItemsResponse);
}